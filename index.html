<html lang="ja">

<meta charset="UTF-8">

<title>東大理一 学習スケジュール</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d12;--surface:#13131e;--surface2:#1a1a28;--border:#22223a;
  --text:#e8e8f2;--muted:#55556a;--dim:#2a2a40;
  --accent:#f0c040;--accent2:#ff6b35;
  --math:#4a9eff;--phys:#ff6b9d;--chem:#4adebb;--eng:#a78bfa;
  --exam:#f87171;--event:#fbbf24;--done:#4ade80;
  --tetsu:#ff6b35;--takeda:#a78bfa;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;padding:16px 14px 100px;max-width:580px;margin:0 auto}

/* header */
.hd{margin-bottom:18px;display:flex;align-items:flex-end;justify-content:space-between}
.hd-left h1{font-family:'Bebas Neue',cursive;font-size:30px;letter-spacing:4px;color:var(--accent);line-height:1}
.hd-left p{font-size:10px;color:var(--muted);letter-spacing:.1em;margin-top:3px}
.hd-right{font-size:11px;color:var(--muted);text-align:right}
.hd-right strong{color:var(--accent);font-size:14px;display:block}

/* global progress */
.prog-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:14px}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px}
.prog-track{height:5px;background:var(--dim);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:3px;transition:width .35s}

/* phase tabs */
.phase-tabs{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.phase-tabs::-webkit-scrollbar{display:none}
.ptab{padding:5px 11px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);white-space:nowrap;transition:all .15s}
.ptab.active{background:var(--accent);color:#0d0d12;border-color:var(--accent)}
.ptab:hover:not(.active){background:var(--surface2);color:var(--text)}

/* phase panel */
.pphase{display:none}.pphase.active{display:block}

/* week header */
.week-hd{margin-bottom:10px;margin-top:4px}
.week-hd-title{font-family:'Bebas Neue',cursive;font-size:15px;letter-spacing:2px;color:var(--accent2);margin-bottom:5px}
.week-hd-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}

/* day card */
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.day-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.day-hd:hover{background:var(--surface2)}
.day-left{display:flex;align-items:center;gap:8px}
.day-label{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;line-height:1}
.day-label.weekend{color:var(--accent)}
.day-label.weekday{color:var(--text)}
.day-label.holiday{color:var(--exam)}
.day-date{font-size:11px;color:var(--muted)}
.day-right{display:flex;align-items:center;gap:8px}
.day-prog{font-size:10px;color:var(--muted)}
.day-chevron{font-size:12px;color:var(--muted);transition:transform .2s}
.day-card.open .day-chevron{transform:rotate(180deg)}
.day-body{display:none;padding:0 12px 12px}
.day-card.open .day-body{display:block}

/* section within day */
.dsec{margin-top:8px}
.dsec-title{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding-bottom:4px;border-bottom:1px solid var(--border);margin-bottom:6px}

/* todo */
.todo{display:flex;align-items:flex-start;gap:9px;padding:6px 4px;border-radius:7px;cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent}
.todo:hover{background:var(--surface2)}
.todo.checked{opacity:.4}
.todo.checked .todo-text{text-decoration:line-through;color:var(--muted)}
.cb{width:17px;height:17px;border-radius:4px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.todo.checked .cb{background:var(--done);border-color:var(--done)}
.cb-check{display:none;color:#0d0d12;font-size:10px;font-weight:900}
.todo.checked .cb-check{display:block}
.todo-left{display:flex;flex-direction:column;gap:2px;flex:1}
.todo-text{font-size:12.5px;line-height:1.45}
.todo-sub{font-size:10.5px;color:var(--muted)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.dot.math{background:var(--math)}.dot.phys{background:var(--phys)}.dot.chem{background:var(--chem)}
.dot.eng{background:var(--eng)}.dot.exam{background:var(--exam)}.dot.event{background:var(--event)}
.dot.tetsu{background:var(--tetsu)}.dot.takeda{background:var(--takeda)}.dot.free{background:var(--done)}
.dot.misc{background:var(--muted)}

/* badge */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.02em}
.badge.exam{background:rgba(248,113,113,.18);color:var(--exam);border:1px solid rgba(248,113,113,.35)}
.badge.event{background:rgba(251,191,36,.15);color:var(--event);border:1px solid rgba(251,191,36,.3)}
.badge.tetsu{background:rgba(255,107,53,.15);color:var(--tetsu);border:1px solid rgba(255,107,53,.3)}
.badge.takeda{background:rgba(167,139,250,.15);color:var(--takeda);border:1px solid rgba(167,139,250,.3)}
.badge.free{background:rgba(74,222,128,.12);color:var(--done);border:1px solid rgba(74,222,128,.25)}

/* alert box */
.alert{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:9px 12px;margin-bottom:10px;font-size:11.5px;line-height:1.7;color:var(--muted)}
.alert strong{color:var(--text)}

.div{height:1px;background:var(--border);margin:5px 0}

/* day progress bar — sits BELOW the header, outside click zone */
.day-prog-bar{height:3px;background:var(--dim);border-radius:0 0 0 0;overflow:hidden;flex-shrink:0}
.day-prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--done));transition:width .35s;border-radius:2px}
.day-prog{font-size:10px;color:var(--muted);min-width:28px;text-align:right}

/* week (phase) progress bar */
.phase-prog-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 13px;margin-bottom:12px}
.phase-prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.phase-prog-label{font-size:10px;color:var(--muted);letter-spacing:.05em}
.phase-prog-nums{font-size:11px;font-weight:700;color:var(--accent)}
.phase-prog-track{height:6px;background:var(--dim);border-radius:3px;overflow:hidden}
.phase-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:3px;transition:width .4s}
</style>

// ─────────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────────
function sk(did, idx){ return `v2_${did}_${idx}`; }
function isChk(did, idx){ try{ return localStorage.getItem(sk(did,idx))==='1'; }catch(e){return false;} }
function setChk(did, idx, v){ try{ localStorage.setItem(sk(did,idx), v?'1':'0'); }catch(e){} }

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
const phaseTabsEl = document.getElementById('phase-tabs');
const phasePanelsEl = document.getElementById('phase-panels');

function buildAll(){
  phaseTabsEl.innerHTML='';
  phasePanelsEl.innerHTML='';

  PHASES.forEach((ph,pi)=>{
    // phase tab
    const ptab = document.createElement('button');
    ptab.className='ptab'+(pi===0?' active':'');
    ptab.textContent=ph.label;
    ptab.onclick=()=>{
      document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.pphase').forEach(p=>p.classList.remove('active'));
      ptab.classList.add('active');
      document.getElementById('pp_'+ph.id).classList.add('active');
    };
    phaseTabsEl.appendChild(ptab);

    // phase panel
    const pPanel = document.createElement('div');
    pPanel.className='pphase'+(pi===0?' active':'');
    pPanel.id='pp_'+ph.id;

    // week header
    const whdDiv = document.createElement('div');
    whdDiv.className='week-hd';
    whdDiv.innerHTML=`
      <div class="week-hd-title">${ph.label}</div>
      <div class="week-hd-tags">${ph.tags.map(t=>`<span class="badge ${t.c}">${t.t}</span>`).join('')}</div>
    `;
    pPanel.appendChild(whdDiv);

    const alertDiv = document.createElement('div');
    alertDiv.className='alert';
    alertDiv.innerHTML=ph.alert;
    pPanel.appendChild(alertDiv);

    // ── フェーズ（週）進捗バー ──
    const phProgWrap = document.createElement('div');
    phProgWrap.className='phase-prog-wrap';
    phProgWrap.id='phase-prog-'+ph.id;
    // 初期値計算
    let phTotal=0, phDone=0;
    ph.days.forEach(d=>{
      let gi2=0;
      d.sections.forEach(sec=>sec.items.forEach(()=>{
        phTotal++;
        if(isChk(d.id,gi2)) phDone++;
        gi2++;
      }));
    });
    const phPct = phTotal? Math.round(phDone/phTotal*100):0;
    phProgWrap.innerHTML=`
      <div class="phase-prog-row">
        <span class="phase-prog-label">このフェーズの進捗</span>
        <span class="phase-prog-nums" id="phase-prog-nums-${ph.id}">${phDone} / ${phTotal} タスク（${phPct}%）</span>
      </div>
      <div class="phase-prog-track"><div class="phase-prog-fill" id="phase-prog-fill-${ph.id}" style="width:${phPct}%"></div></div>
    `;
    pPanel.appendChild(phProgWrap);

    ph.days.forEach(day=>{
      // 🌅 毎朝タスク：旅行・模試当日は除外
      const skipMorning = ['d0719','d0728','d0729','d0730','d0731','d0801','d0819'].includes(day.id);
      if(!skipMorning){
        const morningTask = {
          title:'🌅 毎朝タスク（起きたらすぐ・スマホより先）',
          items:[
            {cat:'math',text:'数Ⅲ 計算ドリル 1枚目',sub:'起きてすぐ。頭が動く前でもできる'},
            {cat:'math',text:'数Ⅲ 計算ドリル 2枚目',sub:'8/19までに111枚完走するために毎朝2枚'},
          ]
        };
        day.sections = [morningTask, ...day.sections];
      }
      // 武田 毎日宿題を自動挿入（武田授業日・旅行・模試当日は除外）
      const skipTakeda = ['d0703','d0704','d0705','d0706','d0708','d0719','d0728','d0729','d0802','d0819'].includes(day.id)
        || day.id.startsWith('d08') && !['d0802','d0803','d0809','d0810','d0817','d0818','d0819'].includes(day.id);

      // 武田授業日（金）は別セクションがあるので宿題セクションだけ追加
      const isTakedaClass = ['d0606','d0613','d0620','d0627','d0704','d0711','d0718','d0725'].includes(day.id);

      if(!skipTakeda && !isTakedaClass){
        // 武田 毎日タスクセクションを末尾に追加
        const takedaDaily = {
          title:'📘 武田 毎日タスク',
          items:[
            {cat:'eng', text:'ターゲット1900：今日の範囲 100語確認',sub:'501〜1900をローテ。忘れてた語に印をつける'},
            {cat:'eng', text:'速読英熟語：今日の範囲（2〜3ページ）',sub:'音声も活用'},
            {cat:'eng', text:'Vintage：今日の章（1〜2章）',sub:'文法→語法の順で'},
            {cat:'math',text:'合格る計算 数Ⅲ：39番（毎日）',sub:'鉄緑計算ドリルと重複→6/6武田で先生に統合相談'},
            {cat:'math',text:'合格る計算 1A2B or 基礎問精講（今日の指定分）',sub:'武田の日次表を確認'},
          ]
        };
        day.sections = [...day.sections, takedaDaily];
      } else if(isTakedaClass){
        // 武田授業日は宿題受け取り＋毎日タスクの軽量版
        const takedaClassDay = {
          title:'📘 武田 毎日タスク（授業日）',
          items:[
            {cat:'eng', text:'ターゲット1900：今日の範囲 100語確認',sub:''},
            {cat:'eng', text:'速読英熟語：今日の範囲',sub:''},
            {cat:'eng', text:'Vintage：今日の章',sub:''},
            {cat:'math',text:'合格る計算 数Ⅲ：39番',sub:''},
            {cat:'takeda',text:'武田 授業後：次回宿題の内容をメモ・確認',sub:'日次スケジュール表と照合する'},
          ]
        };
        day.sections = [...day.sections, takedaClassDay];
      }

      // count items for this day
      const total = day.sections.reduce((s,sec)=>s+sec.items.length,0);
      let done = 0;
      let globalIdx=0;
      day.sections.forEach(sec=>sec.items.forEach((_,i)=>{
        if(isChk(day.id, globalIdx)) done++;
        globalIdx++;
      }));

      const card = document.createElement('div');
      card.className='day-card';
      if(total>0 && done===total) card.classList.add('open');

      const labelClass = day.type==='weekend'?'weekend':day.type==='holiday'?'holiday':'weekday';
      const progPct = total? Math.round(done/total*100):0;

      card.innerHTML=`
        <div class="day-hd">
          <div class="day-left">
            <span class="day-label ${labelClass}">${day.label}</span>
            <span class="day-date">${day.date}</span>
          </div>
          <div class="day-right">
            <span class="day-prog">${done}/${total}</span>
            <span class="day-chevron">▼</span>
          </div>
        </div>
        <div class="day-prog-bar"><div class="day-prog-bar-fill" style="width:${progPct}%"></div></div>
        <div class="day-body"></div>
      `;

      const dayHd = card.querySelector('.day-hd');
      const dayBody = card.querySelector('.day-body');

      // build sections inside body
      day.sections.forEach(sec=>{
        const secDiv = document.createElement('div');
        secDiv.className='dsec';
        secDiv.innerHTML=`<div class="dsec-title">${sec.title}</div>`;
        sec.items.forEach(item=>{
          const itemDiv = document.createElement('div');
          // we need a stable index per day
          itemDiv.dataset.dayid = day.id;
          secDiv.appendChild(itemDiv);
        });
        dayBody.appendChild(secDiv);
      });

      // now assign indices and bind
      let gi=0;
      dayBody.querySelectorAll('.dsec').forEach((secEl,si)=>{
        const sec = day.sections[si];
        const itemEls = secEl.querySelectorAll('[data-dayid]');
        sec.items.forEach((item,ii)=>{
          const idx = gi++;
          const chk = isChk(day.id, idx);
          const el = itemEls[ii];
          el.className='todo'+(chk?' checked':'');
          el.innerHTML=`
            <div class="dot ${item.cat}"></div>
            <div class="cb"><span class="cb-check">✓</span></div>
            <div class="todo-left">
              <span class="todo-text">${item.text}</span>
              ${item.sub?`<span class="todo-sub">${item.sub}</span>`:''}
            </div>
          `;
          el.onclick=()=>{
            const now = !el.classList.contains('checked');
            el.classList.toggle('checked',now);
            setChk(day.id, idx, now);
            updateDayProg(card, day);
            updateGlobalProg();
          };
        });
      });

      dayHd.onclick=(e)=>{
        if(e.target.closest('.todo')) return;
        card.classList.toggle('open');
      };

      pPanel.appendChild(card);
    });

    phasePanelsEl.appendChild(pPanel);
  });

  updateGlobalProg();
}

function updateDayProg(card, day){
  let total=0, done=0, gi=0;
  day.sections.forEach(sec=>sec.items.forEach(()=>{
    total++;
    if(isChk(day.id,gi)) done++;
    gi++;
  }));
  const pct = total? Math.round(done/total*100):0;
  card.querySelector('.day-prog').textContent=`${done}/${total}`;
  const fill = card.querySelector('.day-prog-bar-fill');
  if(fill) fill.style.width=pct+'%';
}

function updateGlobalProg(){
  let total=0,done=0;
  PHASES.forEach(ph=>{
    let phTotal=0, phDone=0;
    ph.days.forEach(day=>{
      let gi=0;
      day.sections.forEach(sec=>sec.items.forEach(()=>{
        total++; phTotal++;
        if(isChk(day.id,gi)){ done++; phDone++; }
        gi++;
      }));
    });
    // update phase bar
    const pct=phTotal?Math.round(phDone/phTotal*100):0;
    const fill=document.getElementById('phase-prog-fill-'+ph.id);
    const nums=document.getElementById('phase-prog-nums-'+ph.id);
    if(fill) fill.style.width=pct+'%';
    if(nums) nums.textContent=`${phDone} / ${phTotal} タスク（${pct}%）`;
  });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct-label').textContent=`${done} / ${total} 完了`;
  document.getElementById('hd-pct').textContent=pct+'%';
}

buildAll();
</script>
</body>
</html>
